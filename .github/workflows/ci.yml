name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *" # Daily at 02:00 UTC
  workflow_dispatch:

# Cancel in-progress runs for the same PR/branch to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read # Default read-only for all jobs

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Format Quality Gate
  # ---------------------------------------------------------------------------
  fmt:
    name: Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup just
        uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
          cache: false

      - name: Install EditorConfig Checker
        run: go install github.com/editorconfig-checker/editorconfig-checker/v3/cmd/editorconfig-checker@v3.7.0

      - name: EditorConfig Check
        run: editorconfig-checker

      - name: Source Format Check
        uses: dprint/check@9cb3a2b17a8e606d37aae341e49df3654933fc23 # v2.3

      - name: Justfile Format Check
        run: just --fmt --check

  # ---------------------------------------------------------------------------
  # Stage 1: Lint Quality Gate
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@ded1f9488f68a970bc66ea5619e13e9b52e601cd # v23.2.0
        with:
          globs: |
            **/*.md

      - name: YAML Lint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3.1.1

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: stable
          cache: false

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: ActionLint
        run: actionlint -verbose

      - name: Spell Check
        uses: streetsidesoftware/cspell-action@de2a73e963e7443969755b648a1008f77033c5b2 # v8.4.0
        with:
          check_dot_files: true
          files: |
            **/*.{md,mdx,txt,yml,yaml,json,jsonc,toml}

      - name: Vale
        uses: vale-cli/vale-action@85f9f7f2c5f449ac0ae5b66662961bae3f77ca6a # 2.1.2
        with:
          files: .
          fail_on_error: true

  # ---------------------------------------------------------------------------
  # Stage 1: Security Quality Gate
  # ---------------------------------------------------------------------------
  security:
    name: Security
    runs-on: ubuntu-latest

    permissions:
      security-events: write # Required to upload security scan results to GitHub Security tab.

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Semgrep OSS
        run: |
          docker run --rm -v "$PWD:/src" -w /src \
            semgrep/semgrep semgrep ci --oss-only

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml
          format: table
          exit-code: "1"

      - name: Trivy SARIF
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        if: always()
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          persona: pedantic

  # ---------------------------------------------------------------------------
  # Stage 1: Antivirus Scan Gate
  # ---------------------------------------------------------------------------
  antivirus:
    name: Antivirus
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install ClamAV
        run: |
          sudo apt-get update
          sudo apt-get install -y clamav

      - name: Prepare freshclam
        run: |
          sudo systemctl stop clamav-freshclam 2>/dev/null || true
          sudo pkill -f freshclam 2>/dev/null || true
          sudo rm -f /var/log/clamav/freshclam.log

      - name: Update virus database
        run: sudo freshclam

      - name: Scan for malware
        run: |
          clamscan -r \
            --infected \
            --exclude-dir='^\.git$' \
            .

  # ---------------------------------------------------------------------------
  # Stage 1: Documentation Gate
  # ---------------------------------------------------------------------------
  docs:
    name: Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Restore Bun cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('docs/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: docs
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        working-directory: docs
        run: bun audit

      - name: Build docs
        working-directory: docs
        run: bun run docs:build

      - name: Link Check
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: "--config .lychee.toml --no-progress --verbose --root-dir ${{ github.workspace }}/docs/.vitepress/dist docs/.vitepress/dist *.md skills"
          fail: true

      - name: Upload Cloudflare Pages artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cloudflare-docs-pages
          path: docs/.vitepress/dist/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          name: github-pages
          path: docs/.vitepress/dist

  # ---------------------------------------------------------------------------
  # Stage 1: Agent Skills Quality Gate
  # ---------------------------------------------------------------------------
  validate:
    name: Validate Skills
    runs-on: ubuntu-latest

    env:
      SKILL_PATH: skills

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "stable"
          cache: false

      - name: Install skill-validator
        run: |
          go install \
            github.com/agent-ecosystem/skill-validator/cmd/skill-validator@latest

      - name: Validate Skills
        run: |
          skill-validator check --strict --emit-annotations "$SKILL_PATH"
          skill-validator check --strict --output markdown \
            "$SKILL_PATH" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Stage 2: Deploy GitHub Pages
  # ---------------------------------------------------------------------------
  deploy-gh-pages:
    name: Deploy GH Pages
    runs-on: ubuntu-latest

    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      github.event_name != 'schedule' &&
      github.actor != 'dependabot[bot]'

    needs:
      - fmt
      - lint
      - security
      - antivirus
      - docs
      - validate

    permissions:
      pages: write # Required to deploy GitHub Pages artifacts.
      id-token: write # Required for OIDC authentication with GitHub Pages.

    environment:
      name: github-pages
      url: ${{ steps.github_pages.outputs.page_url }}

    steps:
      - name: Release on GitHub Pages
        id: github_pages
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
        with:
          artifact_name: github-pages

  # ---------------------------------------------------------------------------
  # Stage 2: Cloudflare Preflight
  # ---------------------------------------------------------------------------
  cf-preflight:
    name: Cloudflare Preflight
    runs-on: ubuntu-latest

    needs:
      - fmt
      - lint
      - security
      - antivirus
      - docs
      - validate

    if: |
      github.event_name != 'schedule' &&
      github.actor != 'dependabot[bot]' &&
      github.event.pull_request.head.repo.fork != true

    outputs:
      enabled: ${{ steps.check.outputs.enabled }}

    steps:
      - name: Check Cloudflare configuration
        id: check
        env:
          ENABLED: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' && vars.CF_DOCS_PAGES_PROJECT != '' && vars.CF_DOCS_PAGES_DOMAIN != '' }}
        run: echo "enabled=$ENABLED" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Stage 2: Deploy Cloudflare Pages
  # ---------------------------------------------------------------------------
  deploy-cf-pages:
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest
    needs: cf-preflight
    if: needs.cf-preflight.outputs.enabled == 'true'

    permissions:
      pull-requests: write # Required to post the docs preview link as a PR comment.

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CF_DOCS_PAGES_PROJECT: ${{ vars.CF_DOCS_PAGES_PROJECT }}
      CF_DOCS_PAGES_DOMAIN: ${{ vars.CF_DOCS_PAGES_DOMAIN }}
      CF_DOCS_BRANCH: pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Download docs artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cloudflare-docs-pages
          path: docs/.vitepress/dist

      - name: Deploy docs preview to Cloudflare Pages
        if: github.event_name == 'pull_request'
        id: cf_docs_preview
        run: |
          bunx wrangler pages deploy ./docs/.vitepress/dist --project-name "$CF_DOCS_PAGES_PROJECT" --branch "$CF_DOCS_BRANCH"
          echo "docs_preview_url=https://${CF_DOCS_BRANCH}.${CF_DOCS_PAGES_DOMAIN}" >> "$GITHUB_OUTPUT"

      - name: Deploy docs production to Cloudflare Pages
        if: >-
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        run: bunx wrangler pages deploy ./docs/.vitepress/dist --project-name "$CF_DOCS_PAGES_PROJECT"

      - name: Update sticky PR comment
        if: >-
          github.event_name == 'pull_request' &&
          steps.cf_docs_preview.outputs.docs_preview_url != ''
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: docs-preview
          message: |
            ## Documentation Preview

            Deployed: ${{ steps.cf_docs_preview.outputs.docs_preview_url }}
