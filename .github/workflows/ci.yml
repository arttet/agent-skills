name: CI

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "0 2 * * *" # Daily at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Format Quality Gate
  # ---------------------------------------------------------------------------
  fmt:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup just
        uses: extractions/setup-just@v4

      - name: Setup EditorConfig Checker
        uses: editorconfig-checker/action-editorconfig-checker@main

      - name: EditorConfig Check
        run: editorconfig-checker

      - name: Source Format Check
        uses: dprint/check@v2.3

      - name: Justfile Format Check
        run: just --fmt --check

  # ---------------------------------------------------------------------------
  # Stage 1: Lint Quality Gate
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Markdown Lint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            **/*.md

      - name: YAML Lint
        uses: ibiqlik/action-yamllint@v3

      - name: ActionLint
        uses: raven-actions/actionlint@v2

      - name: Spell Check
        uses: streetsidesoftware/cspell-action@v8
        with:
          files: |
            **/*.{md,mdx,txt,yml,yaml,json,jsonc,toml}

      - name: Vale
        uses: vale-cli/vale-action@v2
        with:
          files: .
          fail_on_error: true

  # ---------------------------------------------------------------------------
  # Stage 1: Security Quality Gate
  # ---------------------------------------------------------------------------
  security:
    name: Security
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Semgrep OSS
        run: |
          docker run --rm -v "$PWD:/src" -w /src \
            semgrep/semgrep semgrep ci --oss-only

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml
          format: table
          exit-code: "1"

      - name: Trivy SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        if: always()
        continue-on-error: true
        with:
          scan-type: fs
          scan-ref: .
          trivy-config: trivy.yaml
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Zizmor
        uses: zizmorcore/zizmor-action@v0.2.0
        with:
          persona: pedantic

      - name: ClamAV Malware Scan
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y clamav
          sudo freshclam || true

          clamscan -r \
            --infected \
            --exclude-dir='^\.git$' \
            .

  # ---------------------------------------------------------------------------
  # Stage 1: Documentation Gate
  # ---------------------------------------------------------------------------
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Restore Bun cache
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('docs/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Restore Lychee Cache
        id: lychee-cache
        uses: actions/cache/restore@v4
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            lychee-${{ runner.os }}-

      - name: Install dependencies
        run: bun --bun install --cwd docs --frozen-lockfile

      - name: Audit dependencies
        run: cd docs && bun audit

      - name: Build docs
        run: bun --bun run --cwd docs docs:build

      - name: Link Check
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --cache
            --max-cache-age 1d
            './**/*.md'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save Lychee Cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: .lycheecache
          key: ${{ steps.lychee-cache.outputs.cache-primary-key }}

      - name: Upload Cloudflare Pages artifact
        uses: actions/upload-artifact@v7
        with:
          name: cloudflare-docs-pages
          path: docs/.vitepress/dist/

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          name: github-pages
          path: docs/.vitepress/dist

  # ---------------------------------------------------------------------------
  # Stage 1: Agent Skills Quality Gate
  # ---------------------------------------------------------------------------
  validate:
    name: Validate Skills
    runs-on: ubuntu-latest
    env:
      SKILL_PATH: skills

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Install skill-validator
        run: |
          go install \
            github.com/agent-ecosystem/skill-validator/cmd/skill-validator@latest

      - name: Validate Skills
        run: |
          skill-validator check --strict --emit-annotations "$SKILL_PATH"
          skill-validator check --strict --output markdown \
            "$SKILL_PATH" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Stage 2: Deploy GitHub Pages
  # ---------------------------------------------------------------------------
  deploy-gh-pages:
    name: Deploy GH Pages
    runs-on: ubuntu-latest

    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      github.event_name != 'schedule' &&
      github.actor != 'dependabot[bot]'

    needs:
      - fmt
      - lint
      - security
      - docs
      - validate

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.github_pages.outputs.page_url }}

    steps:
      - name: Release on GitHub Pages
        id: github_pages
        uses: actions/deploy-pages@v5
        with:
          artifact_name: github-pages
