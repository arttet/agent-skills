max_retries = 2
timeout = 15
verbose = "info"
accept = [200, 204, 206, 429]
exclude_loopback = true
exclude_private = true
include_mail = false
exclude = [
  "^mailto:",
  "^file:",
  "localhost",
  "127.0.0.1",
  "0.0.0.0",
  # Self-hosted docs site; do not fail CI when its origin is unreachable.
  "^https?://skills\\.arttet\\.dev",
  # TEMP: self-references to files on `main` that have not been pushed yet
  # (chicken-and-egg with the first PR adding them). Remove this entry once
  # the targets exist on the default branch.
  "^https?://github\\.com/arttet/agent-skills/blob/main/",
]
